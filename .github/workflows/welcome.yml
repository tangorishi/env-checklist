name: Welcome Message

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome New Contributor
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "Thanks for opening your first issue here! We'll take a look as soon as possible. ✈️"
          pr-message: "Thanks for the PR! I'm a bot, but a human will review your changes shortly. Make sure your tests pass! ✅"